<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>礼のタイミング メトロノーム</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [isPlaying, setIsPlaying] = useState(false);
            const [phase, setPhase] = useState('idle');
            const [progress, setProgress] = useState(0);
            const [showSettings, setShowSettings] = useState(false);
            const [settings, setSettings] = useState({ wait: 2.0, down: 1.0, hold: 1.0, up: 2.0 });

            const requestRef = useRef();
            const startTimeRef = useRef();
            const phaseRef = useRef('idle');

            const animate = (time) => {
                if (!startTimeRef.current) startTimeRef.current = time;
                const elapsed = (time - startTimeRef.current) / 1000;
                const currentDuration = settings[phaseRef.current] || 1;

                if (elapsed >= currentDuration) {
                    startTimeRef.current = time;
                    switch (phaseRef.current) {
                        case 'wait': phaseRef.current = 'down'; break;
                        case 'down': phaseRef.current = 'hold'; break;
                        case 'hold': phaseRef.current = 'up'; break;
                        case 'up': phaseRef.current = 'wait'; break;
                        default: phaseRef.current = 'wait';
                    }
                    setPhase(phaseRef.current);
                    setProgress(0);
                } else {
                    setProgress(elapsed / currentDuration);
                }
                requestRef.current = requestAnimationFrame(animate);
            };

            useEffect(() => {
                if (isPlaying) {
                    phaseRef.current = 'wait';
                    setPhase('wait');
                    startTimeRef.current = null;
                    requestRef.current = requestAnimationFrame(animate);
                } else {
                    cancelAnimationFrame(requestRef.current);
                    setPhase('idle');
                    setProgress(0);
                }
                return () => cancelAnimationFrame(requestRef.current);
            }, [isPlaying]);

            const phaseConfig = {
                idle: { color: 'bg-gray-100', text: '待機中', textColor: 'text-gray-500' },
                wait: { color: 'bg-blue-500', text: '気をつけ', textColor: 'text-white' },
                down: { color: 'bg-red-500', text: '下げる！', textColor: 'text-white' },
                hold: { color: 'bg-yellow-400', text: '止める！', textColor: 'text-white' },
                up: { color: 'bg-green-500', text: 'ゆっくり上げる', textColor: 'text-white' }
            };

            const currentConfig = phaseConfig[phase];

            return (
                <div className={`flex flex-col items-center justify-center min-h-screen transition-colors duration-500 ${currentConfig.color}`}>
                    <h1 className={`text-6xl font-black mb-8 ${currentConfig.textColor}`}>{currentConfig.text}</h1>
                    <div className="w-64 h-4 bg-black/20 rounded-full overflow-hidden mb-12">
                        <div className="h-full bg-white transition-all duration-100" style={{ width: `${progress * 100}%` }}></div>
                    </div>
                    <button onClick={() => setIsPlaying(!isPlaying)} className="px-12 py-6 bg-white text-gray-900 rounded-full font-bold text-2xl shadow-xl hover:scale-105 transition-transform">
                        {isPlaying ? 'ストップ' : '練習スタート'}
                    </button>
                    <button onClick={() => setShowSettings(true)} className="absolute top-6 right-6 p-3 bg-white/20 text-white rounded-full hover:bg-white/30 transition">設定</button>
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-6">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-md">
                                <h2 className="text-2xl font-bold mb-6 text-gray-900">秒数設定</h2>
                                {Object.entries(settings).map(([key, value]) => (
                                    <div key={key} className="flex items-center justify-between mb-4">
                                        <span className="capitalize font-medium text-gray-700">{key}</span>
                                        <input type="number" step="0.1" value={value} onChange={(e) => setSettings({...settings, [key]: parseFloat(e.target.value) || 0})} className="w-24 p-2 border-2 rounded-lg text-right font-bold" />
                                    </div>
                                ))}
                                <button onClick={() => setShowSettings(false)} className="w-full mt-6 py-4 bg-gray-900 text-white rounded-xl font-bold">閉じる</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
  );
}
